<svg width="1440" height="1800" viewBox="0 0 1440 1800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f6f6f4; }
      .panel { fill: #ffffff; stroke: #2f2f2f; stroke-width: 2; rx: 14; }
      .panel-soft { fill: #fbfbfa; stroke: #6b6b6b; stroke-width: 1.5; rx: 12; }
      .nav { fill: #ecece8; stroke: #2f2f2f; stroke-width: 2; rx: 18; }
      .chip { fill: #ededed; stroke: #2f2f2f; stroke-width: 1.5; rx: 20; }
      .title { font: 700 30px Arial, sans-serif; fill: #151515; }
      .h1 { font: 700 22px Arial, sans-serif; fill: #151515; }
      .h2 { font: 700 18px Arial, sans-serif; fill: #151515; }
      .body { font: 14px Arial, sans-serif; fill: #333333; }
      .small { font: 12px Arial, sans-serif; fill: #555555; }
      .mono { font: 12px 'Andale Mono', monospace; fill: #333333; }
      .divider { stroke: #909090; stroke-width: 1.5; }
      .dashed { stroke: #7b7b7b; stroke-width: 1.5; stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="1800"/>

  <text class="title" x="40" y="48">Document Owner Workspace Wireframe</text>
  <text class="small" x="40" y="72">Low-fidelity screen for policy and standard owners aligned to Tollgates 1-4, owner attestation, implementation, and maintenance.</text>

  <rect class="nav" x="32" y="100" width="250" height="1650"/>
  <text class="h1" x="56" y="145">Owner Navigation</text>
  <rect class="panel-soft" x="52" y="170" width="210" height="54"/>
  <text class="body" x="68" y="203">My Active Documents</text>
  <rect class="panel-soft" x="52" y="236" width="210" height="54"/>
  <text class="body" x="68" y="269">Drafts and Redlines</text>
  <rect class="panel-soft" x="52" y="302" width="210" height="54"/>
  <text class="body" x="68" y="335">Annual Reviews Due</text>
  <rect class="panel-soft" x="52" y="368" width="210" height="54"/>
  <text class="body" x="68" y="401">Exceptions and Deferments</text>
  <rect class="panel-soft" x="52" y="434" width="210" height="54"/>
  <text class="body" x="68" y="467">Implementation Plans</text>
  <rect class="panel-soft" x="52" y="500" width="210" height="54"/>
  <text class="body" x="68" y="533">Published Documents</text>

  <text class="h2" x="56" y="614">Quick actions</text>
  <rect class="panel-soft" x="52" y="632" width="210" height="108"/>
  <text class="body" x="68" y="662">+ New policy request</text>
  <text class="body" x="68" y="690">+ Off-cycle change</text>
  <text class="body" x="68" y="718">+ Retirement request</text>

  <text class="h2" x="56" y="786">Agent shortcuts</text>
  <rect class="panel-soft" x="52" y="804" width="210" height="178"/>
  <text class="body" x="68" y="836">Intake and conflict check</text>
  <text class="body" x="68" y="866">Drafting and template QA</text>
  <text class="body" x="68" y="896">Stakeholder review orchestration</text>
  <text class="body" x="68" y="926">Attestation packet builder</text>
  <text class="body" x="68" y="956">Implementation planner</text>

  <rect class="panel" x="306" y="100" width="1102" height="108"/>
  <text class="h1" x="336" y="142">Third-Party Compliance Oversight Policy</text>
  <text class="small" x="336" y="166">Owner: Global Compliance Policy Lead  |  Delegate: Third-Party Risk Program Manager</text>
  <rect class="chip" x="1156" y="122" width="104" height="34"/>
  <text class="body" x="1184" y="144">Tier 2</text>
  <rect class="chip" x="1272" y="122" width="108" height="34"/>
  <text class="body" x="1291" y="144">In review</text>
  <rect class="panel-soft" x="1110" y="164" width="122" height="26"/>
  <text class="small" x="1128" y="182">Preview packet</text>
  <rect class="panel-soft" x="1242" y="164" width="138" height="26"/>
  <text class="small" x="1264" y="182">Notify reviewers</text>

  <rect class="panel" x="306" y="224" width="1102" height="110"/>
  <text class="h2" x="336" y="254">Lifecycle progress</text>
  <line class="divider" x1="360" y1="286" x2="1350" y2="286"/>
  <rect class="chip" x="352" y="270" width="126" height="32"/>
  <text class="small" x="384" y="290">Tollgate 1</text>
  <rect class="chip" x="500" y="270" width="126" height="32"/>
  <text class="small" x="532" y="290">Tollgate 2</text>
  <rect class="chip" x="648" y="270" width="126" height="32"/>
  <text class="small" x="680" y="290">Stakeholder</text>
  <rect class="chip" x="796" y="270" width="126" height="32"/>
  <text class="small" x="832" y="290">QC review</text>
  <rect class="chip" x="944" y="270" width="126" height="32"/>
  <text class="small" x="972" y="290">Attestation</text>
  <rect class="chip" x="1092" y="270" width="126" height="32"/>
  <text class="small" x="1126" y="290">Approvals</text>
  <rect class="chip" x="1240" y="270" width="126" height="32"/>
  <text class="small" x="1260" y="290">Publish</text>

  <rect class="panel" x="306" y="356" width="714" height="314"/>
  <text class="h1" x="336" y="392">1. Intake and conflict check</text>
  <rect class="panel-soft" x="336" y="414" width="308" height="96"/>
  <text class="small" x="352" y="438">Request type</text>
  <text class="body" x="352" y="462">Net new Policy</text>
  <text class="small" x="352" y="486">Compliance domain</text>
  <text class="body" x="352" y="506">Compliance Governance</text>
  <rect class="panel-soft" x="660" y="414" width="330" height="96"/>
  <text class="small" x="676" y="438">Affected entities</text>
  <text class="body" x="676" y="462">Block, Cash App, Square</text>
  <text class="small" x="676" y="486">Requested effective date</text>
  <text class="body" x="676" y="506">Q4 2026</text>
  <rect class="panel-soft" x="336" y="526" width="654" height="122"/>
  <text class="small" x="352" y="550">Conflict-check summary from subagent</text>
  <text class="body" x="352" y="578">- Existing vendor due diligence standard partially overlaps</text>
  <text class="body" x="352" y="604">- No Block-level policy covers the full scope</text>
  <text class="body" x="352" y="630">- Recommendation: proceed as Policy, not Standard</text>

  <rect class="panel" x="1040" y="356" width="368" height="314"/>
  <text class="h1" x="1070" y="392">Owner agent panel</text>
  <rect class="panel-soft" x="1070" y="414" width="308" height="52"/>
  <text class="body" x="1086" y="446">Ask: "Should this be net new or expand existing?"</text>
  <rect class="panel-soft" x="1070" y="480" width="308" height="52"/>
  <text class="body" x="1086" y="512">Ask: "Draft required sections from template"</text>
  <rect class="panel-soft" x="1070" y="546" width="308" height="52"/>
  <text class="body" x="1086" y="578">Ask: "Prepare reviewer list and packet"</text>
  <rect class="panel-soft" x="1070" y="612" width="308" height="36"/>
  <text class="small" x="1086" y="635">Activity log and suggested next steps</text>

  <rect class="panel" x="306" y="692" width="742" height="366"/>
  <text class="h1" x="336" y="728">2. Drafting workspace</text>
  <rect class="panel-soft" x="336" y="748" width="476" height="280"/>
  <text class="small" x="356" y="774">Google Doc / drafting area</text>
  <line class="dashed" x1="356" y1="792" x2="792" y2="792"/>
  <text class="body" x="356" y="822">Document Title</text>
  <text class="body" x="356" y="850">Definitions</text>
  <text class="body" x="356" y="878">Introduction / Purpose / Scope</text>
  <text class="body" x="356" y="906">Requirements</text>
  <text class="body" x="356" y="934">Roles and Responsibilities</text>
  <text class="body" x="356" y="962">Exceptions / Record Retention / Related Docs</text>
  <text class="small" x="356" y="1004">Clean version and redline toggle</text>

  <rect class="panel-soft" x="830" y="748" width="188" height="136"/>
  <text class="small" x="846" y="772">Template checklist</text>
  <text class="body" x="846" y="802">[x] Required sections</text>
  <text class="body" x="846" y="830">[ ] Related docs</text>
  <text class="body" x="846" y="858">[ ] Retention language</text>
  <rect class="panel-soft" x="830" y="898" width="188" height="130"/>
  <text class="small" x="846" y="922">Drafting prompts</text>
  <text class="body" x="846" y="952">- Remove procedural wording</text>
  <text class="body" x="846" y="980">- Add linked Standards</text>
  <text class="body" x="846" y="1008">- Check glossary consistency</text>

  <rect class="panel" x="1066" y="692" width="342" height="366"/>
  <text class="h1" x="1096" y="728">3. Stakeholder review</text>
  <rect class="panel-soft" x="1096" y="748" width="282" height="96"/>
  <text class="small" x="1112" y="772">Reviewer matrix</text>
  <text class="body" x="1112" y="802">Legal Counsel ........ Pending</text>
  <text class="body" x="1112" y="828">Consumer Protection .. Complete</text>
  <rect class="panel-soft" x="1096" y="858" width="282" height="94"/>
  <text class="small" x="1112" y="882">Comment resolution log</text>
  <text class="body" x="1112" y="912">12 open comments</text>
  <text class="body" x="1112" y="938">3 material issues flagged</text>
  <rect class="panel-soft" x="1096" y="966" width="282" height="62"/>
  <text class="small" x="1112" y="990">Actions</text>
  <text class="body" x="1112" y="1016">Send reminders | Export summary</text>

  <rect class="panel" x="306" y="1080" width="552" height="292"/>
  <text class="h1" x="336" y="1116">4. Owner attestation and approval prep</text>
  <rect class="panel-soft" x="336" y="1138" width="492" height="94"/>
  <text class="small" x="352" y="1162">Package completeness</text>
  <text class="body" x="352" y="1190">[x] Clean copy attached</text>
  <text class="body" x="352" y="1216">[x] Redline attached</text>
  <text class="body" x="560" y="1190">[ ] Change summary needed?</text>
  <text class="body" x="560" y="1216">[x] Reviewer evidence retained</text>
  <rect class="panel-soft" x="336" y="1248" width="492" height="96"/>
  <text class="small" x="352" y="1272">Owner attestation prompt</text>
  <text class="body" x="352" y="1300">"I confirm the document content, scope, reviewers,</text>
  <text class="body" x="352" y="1322">and approval package are ready for routing."</text>

  <rect class="panel" x="880" y="1080" width="528" height="292"/>
  <text class="h1" x="910" y="1116">5. Implementation and awareness</text>
  <rect class="panel-soft" x="910" y="1138" width="468" height="92"/>
  <text class="small" x="926" y="1162">Implementation plan</text>
  <text class="body" x="926" y="1190">Workstream owners | Dependencies | Target dates</text>
  <rect class="panel-soft" x="910" y="1244" width="226" height="100"/>
  <text class="small" x="926" y="1268">Communication methods</text>
  <text class="body" x="926" y="1296">Email</text>
  <text class="body" x="926" y="1322">Training</text>
  <rect class="panel-soft" x="1152" y="1244" width="226" height="100"/>
  <text class="small" x="1168" y="1268">Awareness tasks</text>
  <text class="body" x="1168" y="1296">Who changed?</text>
  <text class="body" x="1168" y="1322">How to comply?</text>

  <rect class="panel" x="306" y="1394" width="1102" height="300"/>
  <text class="h1" x="336" y="1430">6. Maintenance center</text>
  <rect class="panel-soft" x="336" y="1450" width="250" height="214"/>
  <text class="small" x="352" y="1474">Annual review</text>
  <text class="body" x="352" y="1504">Next review due:</text>
  <text class="body" x="352" y="1528">2027-02-18</text>
  <text class="body" x="352" y="1560">Start review packet</text>
  <rect class="panel-soft" x="602" y="1450" width="250" height="214"/>
  <text class="small" x="618" y="1474">Off-cycle change</text>
  <text class="body" x="618" y="1504">Immaterial vs material check</text>
  <text class="body" x="618" y="1534">Escalate if material</text>
  <text class="body" x="618" y="1564">Prepare change summary</text>
  <rect class="panel-soft" x="868" y="1450" width="250" height="214"/>
  <text class="small" x="884" y="1474">Deferments and exceptions</text>
  <text class="body" x="884" y="1504">Request extension</text>
  <text class="body" x="884" y="1534">Track mitigation controls</text>
  <text class="body" x="884" y="1564">Renewal reminders</text>
  <rect class="panel-soft" x="1134" y="1450" width="244" height="214"/>
  <text class="small" x="1150" y="1474">Retirement path</text>
  <text class="body" x="1150" y="1504">Retirement rationale</text>
  <text class="body" x="1150" y="1534">Impacted docs</text>
  <text class="body" x="1150" y="1564">Archive request</text>
